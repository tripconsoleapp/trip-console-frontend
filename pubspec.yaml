name: trip_console
description: Trip.Console — Digital Concierge Service mobile app.
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # State Management
  provider: ^6.1.2

  # Navigation
  go_router: ^14.0.0

  # Networking
  dio: ^5.7.0

  # Auth & Push Notifications
  firebase_core: ^3.6.0
  firebase_auth: ^5.3.1
  firebase_messaging: ^15.1.3

  # Payments
  razorpay_flutter: ^1.3.7

  # Maps
  google_maps_flutter: ^2.9.0

  # Fonts
  google_fonts: ^6.2.1

  # Icons (Material Symbols)
  material_symbols_icons: ^4.2794.0

  # Image loading
  cached_network_image: ^3.3.1

  # Loading effects
  shimmer: ^3.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/
